name: Release

on:
  push:
    tags:
      - "*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to publish, for example 0.6.2"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build And Publish Release
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.25.0 --activate
          pnpm --version

      - name: Build release artifacts
        run: ./build_release.sh

      - name: Extract release notes
        run: |
          node --input-type=module <<'EOF'
          import { readFileSync, writeFileSync } from "node:fs";

          const version = process.env.RELEASE_TAG.replace(/^refs\/tags\//, "").replace(/^v/, "");

          function escapeRegExp(value) {
            return value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
          }

          function extractSection(filePath) {
            const lines = readFileSync(filePath, "utf8").split(/\r?\n/);
            const headerPattern = new RegExp(`^##\\s+v?${escapeRegExp(version)}(?:\\s|$)`);
            const startIndex = lines.findIndex((line) => headerPattern.test(line));

            if (startIndex === -1) {
              throw new Error(`Could not find v${version} in ${filePath}`);
            }

            const sectionLines = [];
            for (let i = startIndex + 1; i < lines.length; i += 1) {
              const line = lines[i];
              if (line.trim() === "---" || /^##\s+v?\d/.test(line)) {
                break;
              }
              sectionLines.push(line);
            }

            const section = sectionLines.join("\n").trim();
            if (!section) {
              throw new Error(`Found v${version} in ${filePath}, but the section is empty`);
            }

            return section;
          }

          const englishNotes = extractSection("CHANGELOG.md");
          const chineseNotes = extractSection("CHANGELOG_zh.md");
          const releaseNotes = `# webcode ${version}

          ## English
          ${englishNotes}

          ## 中文
          ${chineseNotes}
          `;

          writeFileSync("release-notes.md", releaseNotes);
          EOF

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ env.RELEASE_TAG }}
        run: |
          VERSION="${TAG_NAME#v}"
          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release upload "${TAG_NAME}" release/* --clobber
            gh release edit "${TAG_NAME}" --title "webcode ${VERSION}" --notes-file release-notes.md
          else
            gh release create "${TAG_NAME}" release/* --title "webcode ${VERSION}" --notes-file release-notes.md --verify-tag
          fi
