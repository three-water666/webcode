<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      body {
        width: 260px;
        font-family: "Segoe UI", sans-serif;
        background: #1e1e1e;
        color: #eee;
        padding: 15px;
      }
      h2 {
        margin: 0 0 15px 0;
        font-size: 16px;
        color: #fff;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .status-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #666;
      }
      .status-dot.online {
        background: #4caf50;
        box-shadow: 0 0 8px rgba(76, 175, 80, 0.4);
      }

      .card {
        background: #252526;
        border-radius: 6px;
        padding: 12px;
        margin-bottom: 12px;
        border: 1px solid #333;
      }
      .btn {
        display: block;
        width: 100%;
        padding: 8px;
        background: #3498db;
        border: none;
        border-radius: 4px;
        color: white;
        cursor: pointer;
        font-size: 13px;
        text-align: center;
        text-decoration: none;
        box-sizing: border-box;
      }
      .btn:hover {
        background: #2980b9;
      }
      .btn:disabled {
        background: #444;
        cursor: not-allowed;
        opacity: 0.7;
      }
      .btn.secondary {
        background: #444;
        margin-top: 8px;
      }
      .btn.secondary:hover {
        background: #555;
      }

      .hidden {
        display: none;
      }
      p {
        margin: 0;
        font-size: 13px;
        line-height: 1.4;
        color: #ccc;
      }
      .checkbox-row {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        margin-bottom: 6px;
      }
      .checkbox-row:last-child {
        margin-bottom: 0;
      }
      input[type="checkbox"] {
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h2>
      <div class="status-dot" id="statusDot"></div>
      WebMCP Bridge
    </h2>

    <div id="connectedView" class="hidden">
      <div class="card">
        <p style="margin-bottom: 8px">✅ Connected to VS Code</p>
        <p style="font-size: 11px; opacity: 0.7">
          Port: <span id="portDisplay">-</span>
        </p>
      </div>
      <button id="copyPromptBtn" class="btn">Copy System Prompt</button>
      <div class="card" style="margin-top: 10px">
        <label class="checkbox-row">
          <input type="checkbox" id="autoSend" checked /> Auto Send Message
        </label>
        <label class="checkbox-row">
          <input type="checkbox" id="showLog" /> Show Floating Log
        </label>
      </div>
    </div>

    <div id="availableView" class="hidden">
      <div class="card" style="border: 1px solid #3498db">
        <h3
          style="
            color: #3498db;
            margin: 0 0 10px 0;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
          "
        >
          <span>⚡</span> Available Gateways
        </h3>
        <div id="gatewayList"></div>
      </div>
    </div>

    <div id="disconnectedView">
      <div class="card" style="padding: 15px 10px; border: 1px solid #555">
        <h3
          style="
            color: #e74c3c;
            margin: 0 0 10px 0;
            font-size: 14px;
            text-align: center;
          "
        >
          🔴 Disconnected
        </h3>

        <div
          style="
            margin-bottom: 15px;
            border-bottom: 1px solid #444;
            padding-bottom: 10px;
          "
        >
          <p
            style="
              font-size: 12px;
              color: #fff;
              font-weight: bold;
              margin-bottom: 5px;
            "
          >
            👉 Already Installed?
          </p>
          <p style="font-size: 11px; color: #ccc; line-height: 1.4">
            Click
            <span style="color: #3498db; font-weight: bold">WebMCP</span> in VS
            Code Status Bar (bottom right) and follow the steps to launch.
          </p>
        </div>

        <div>
          <p
            style="
              font-size: 12px;
              color: #fff;
              font-weight: bold;
              margin-bottom: 5px;
            "
          >
            👉 Not Installed?
          </p>
          <div
            style="
              background: #333;
              padding: 8px;
              border-radius: 4px;
              margin: 5px 0;
            "
          >
            <p style="font-size: 10px; color: #888; margin-bottom: 2px">
              Search in VS Code Marketplace:
            </p>
            <p style="font-weight: bold; color: #4caf50; font-size: 12px">
              WebMCP Gateway
            </p>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="src/popup/index.ts"></script>
  </body>
</html>
