<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      body {
        width: 260px;
        font-family: "Segoe UI", sans-serif;
        background: #1e1e1e;
        color: #eee;
        padding: 15px;
      }
      h2 {
        margin: 0 0 15px 0;
        font-size: 16px;
        color: #fff;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .status-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #666;
      }
      .status-dot.online {
        background: #4caf50;
        box-shadow: 0 0 8px rgba(76, 175, 80, 0.4);
      }

      .card {
        background: #252526;
        border-radius: 6px;
        padding: 12px;
        margin-bottom: 12px;
        border: 1px solid #333;
      }
      .connected-stack {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .connected-stack .card {
        margin-bottom: 0;
      }
      .status-card {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }
      .status-card.disconnected {
        border-color: #4a3030;
        background: #2a2424;
      }
      .connection-label {
        color: #fff;
        font-weight: 600;
        line-height: 1.35;
      }
      .connection-label.disconnected {
        color: #ffb4aa;
      }
      .status-meta {
        flex: none;
        color: #a6a6a6;
        font-size: 11px;
        line-height: 1.4;
        text-align: right;
        white-space: nowrap;
      }
      .settings-card {
        padding: 4px 12px;
      }
      .disconnected-stack {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .disconnected-stack .card {
        margin-bottom: 0;
      }
      .install-section {
        padding: 12px;
      }
      .install-section + .install-section {
        border-top: 1px solid #333;
      }
      .section-title {
        color: #fff;
        font-size: 12px;
        font-weight: 700;
        margin-bottom: 6px;
      }
      .installed-action-card,
      .marketplace-card {
        border-radius: 4px;
        margin-top: 6px;
        padding: 8px;
      }
      .installed-action-card {
        background: #263342;
        border: 1px solid #365778;
        color: #cfe7ff;
        font-size: 11px;
      }
      .marketplace-card {
        background: #273629;
        border: 1px solid #3f6344;
      }
      .marketplace-hint {
        color: #aeb8ae;
        font-size: 10px;
        margin-bottom: 2px;
      }
      .marketplace-query {
        color: #7bd88f;
        font-size: 12px;
        font-weight: 700;
      }
      .btn {
        display: block;
        width: 100%;
        padding: 8px;
        background: #3498db;
        border: none;
        border-radius: 4px;
        color: white;
        cursor: pointer;
        font-size: 13px;
        text-align: center;
        text-decoration: none;
        box-sizing: border-box;
      }
      .btn:hover {
        background: #2980b9;
      }
      .btn:disabled {
        background: #444;
        cursor: not-allowed;
        opacity: 0.7;
      }
      .btn.secondary {
        background: #444;
        margin-top: 8px;
      }
      .btn.secondary:hover {
        background: #555;
      }

      .hidden {
        display: none;
      }
      p {
        margin: 0;
        font-size: 13px;
        line-height: 1.4;
        color: #ccc;
      }
      .checkbox-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        font-size: 12px;
        min-height: 34px;
        margin-bottom: 0;
        border-bottom: 1px solid #333;
      }
      .checkbox-row:last-child {
        border-bottom: none;
      }
      input[type="checkbox"] {
        flex: none;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h2>
      <div class="status-dot" id="statusDot"></div>
      <span id="title">webcode bridge</span>
    </h2>

    <div id="connectedView" class="hidden">
      <div class="connected-stack">
        <div class="card status-card">
          <p id="connectedText" class="connection-label">✅ Connected to VS Code</p>
          <p class="status-meta">
            <span id="portLabel">Port</span>:
            <span id="portDisplay">-</span>
          </p>
        </div>
        <button
          id="manualInitBtn"
          class="btn"
          title="Add initialization context to the current input"
        >
          Manual Initialization
        </button>
        <div class="card settings-card">
          <label class="checkbox-row">
            <span id="autoSendLabel">Auto Send Message</span>
            <input type="checkbox" id="autoSend" checked />
          </label>
          <label class="checkbox-row">
            <span id="showLogLabel">Show Floating Log</span>
            <input type="checkbox" id="showLog" />
          </label>
        </div>
      </div>
    </div>

    <div id="disconnectedView">
      <div class="disconnected-stack">
        <div class="card status-card disconnected">
          <p id="disconnectedTitle" class="connection-label disconnected">
            🔴 Disconnected from VS Code
          </p>
        </div>

        <div class="card install-card">
          <div class="install-section">
            <p class="section-title">
              <span id="installedTitle">VS Code extension installed?</span>
            </p>
            <p id="installedDesc" class="installed-action-card">
              Click
              <span style="color: #3498db; font-weight: bold">webcode</span> in VS
              Code Status Bar (bottom right) and follow the steps to launch.
            </p>
          </div>

          <div class="install-section">
            <p class="section-title">
              <span id="notInstalledTitle">VS Code extension not installed?</span>
            </p>
            <div class="marketplace-card">
              <p id="marketplaceHint" class="marketplace-hint">
                Search in VS Code Marketplace:
              </p>
              <p class="marketplace-query">webcode gateway</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="src/popup/index.ts"></script>
  </body>
</html>
