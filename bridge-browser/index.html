<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      body {
        width: 260px;
        font-family: "Segoe UI", sans-serif;
        background: #1e1e1e;
        color: #eee;
        padding: 15px;
      }
      h2 {
        margin: 0 0 15px 0;
        font-size: 16px;
        color: #fff;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .status-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #666;
      }
      .status-dot.online {
        background: #4caf50;
        box-shadow: 0 0 8px rgba(76, 175, 80, 0.4);
      }

      .card {
        background: #252526;
        border-radius: 6px;
        padding: 12px;
        margin-bottom: 12px;
        border: 1px solid #333;
      }
      .connected-stack {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .connected-stack .card {
        margin-bottom: 0;
      }
      .status-card {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }
      .connection-label {
        color: #fff;
        font-weight: 600;
        line-height: 1.35;
      }
      .status-meta {
        flex: none;
        color: #a6a6a6;
        font-size: 11px;
        line-height: 1.4;
        text-align: right;
        white-space: nowrap;
      }
      .settings-card {
        padding: 4px 12px;
      }
      .btn {
        display: block;
        width: 100%;
        padding: 8px;
        background: #3498db;
        border: none;
        border-radius: 4px;
        color: white;
        cursor: pointer;
        font-size: 13px;
        text-align: center;
        text-decoration: none;
        box-sizing: border-box;
      }
      .btn:hover {
        background: #2980b9;
      }
      .btn:disabled {
        background: #444;
        cursor: not-allowed;
        opacity: 0.7;
      }
      .btn.secondary {
        background: #444;
        margin-top: 8px;
      }
      .btn.secondary:hover {
        background: #555;
      }

      .hidden {
        display: none;
      }
      p {
        margin: 0;
        font-size: 13px;
        line-height: 1.4;
        color: #ccc;
      }
      .checkbox-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        font-size: 12px;
        min-height: 34px;
        margin-bottom: 0;
        border-bottom: 1px solid #333;
      }
      .checkbox-row:last-child {
        border-bottom: none;
      }
      input[type="checkbox"] {
        flex: none;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h2>
      <div class="status-dot" id="statusDot"></div>
      <span id="title">webcode bridge</span>
    </h2>

    <div id="connectedView" class="hidden">
      <div class="connected-stack">
        <div class="card status-card">
          <p id="connectedText" class="connection-label">✅ Connected to VS Code</p>
          <p class="status-meta">
            <span id="portLabel">Port</span>:
            <span id="portDisplay">-</span>
          </p>
        </div>
        <button
          id="manualInitBtn"
          class="btn"
          title="Add initialization context to the current input"
        >
          Manual Initialization
        </button>
        <div class="card settings-card">
          <label class="checkbox-row">
            <span id="autoSendLabel">Auto Send Message</span>
            <input type="checkbox" id="autoSend" checked />
          </label>
          <label class="checkbox-row">
            <span id="showLogLabel">Show Floating Log</span>
            <input type="checkbox" id="showLog" />
          </label>
          <label class="checkbox-row">
            <span id="soundLabel">Notification Sound</span>
            <input type="checkbox" id="logSound" />
          </label>
        </div>
      </div>
    </div>

    <div id="availableView" class="hidden">
      <div class="card" style="border: 1px solid #3498db">
        <h3
          id="availableGateways"
          style="
            color: #3498db;
            margin: 0 0 10px 0;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
          "
        >
          <span>⚡</span> Available Gateways
        </h3>
        <div id="gatewayList"></div>
      </div>
    </div>

    <div id="disconnectedView">
      <div class="card" style="padding: 15px 10px; border: 1px solid #555">
        <h3
          id="disconnectedTitle"
          style="
            color: #e74c3c;
            margin: 0 0 10px 0;
            font-size: 14px;
            text-align: center;
          "
        >
          🔴 Disconnected
        </h3>

        <div
          style="
            margin-bottom: 15px;
            border-bottom: 1px solid #444;
            padding-bottom: 10px;
          "
        >
          <p
            style="
              font-size: 12px;
              color: #fff;
              font-weight: bold;
              margin-bottom: 5px;
            "
          >
            <span id="installedTitle">👉 Already Installed?</span>
          </p>
          <p id="installedDesc" style="font-size: 11px; color: #ccc; line-height: 1.4">
            Click
            <span style="color: #3498db; font-weight: bold">webcode</span> in VS
            Code Status Bar (bottom right) and follow the steps to launch.
          </p>
        </div>

        <div>
          <p
            style="
              font-size: 12px;
              color: #fff;
              font-weight: bold;
              margin-bottom: 5px;
            "
          >
            <span id="notInstalledTitle">👉 Not Installed?</span>
          </p>
          <div
            style="
              background: #333;
              padding: 8px;
              border-radius: 4px;
              margin: 5px 0;
            "
          >
            <p id="marketplaceHint" style="font-size: 10px; color: #888; margin-bottom: 2px">
              Search in VS Code Marketplace:
            </p>
            <p style="font-weight: bold; color: #4caf50; font-size: 12px">
              webcode gateway
            </p>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="src/popup/index.ts"></script>
  </body>
</html>
